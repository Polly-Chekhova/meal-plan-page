<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3f6b4e">
<meta name="color-scheme" content="light">
<title>This week's meal plan</title>
</head>
<body>
<style>
  :root {
    --paper: #f5f6f2;
    --surface: #ffffff;
    --ink: #1e241f;
    --muted: #6e756c;
    --faint: #9aa198;
    --accent: #3f6b4e;
    --accent-deep: #2f5a3e;
    --accent-soft: #e7efe7;
    --warn: #a65a25;
    --warn-soft: #f7ebdd;
    --line: #e4e7e0;
    --line-soft: #eef0ea;
    --shadow: 0 1px 2px rgba(30, 36, 31, .05), 0 8px 24px rgba(30, 36, 31, .06);
    --font-head: Georgia, "Iowan Old Style", "Palatino", "Times New Roman", serif;
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, sans-serif;
    --r: 14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
  }

  .wrap {
    max-width: 560px; margin: 0 auto;
    padding: 0 max(16px, env(safe-area-inset-left)) calc(96px + env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-right));
  }

  /* ---- header ---- */
  header.top {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: saturate(1.4) blur(10px);
    -webkit-backdrop-filter: saturate(1.4) blur(10px);
    border-bottom: 1px solid var(--line);
    margin: 0 -16px 16px;
    padding: calc(14px + env(safe-area-inset-top)) 16px 12px;
  }
  .top-inner { max-width: 560px; margin: 0 auto; display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .eyebrow { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  h1.title { font-family: var(--font-head); font-weight: 600; font-size: 22px; margin: 2px 0 0; letter-spacing: -.01em; }
  .when { font-size: 12.5px; color: var(--muted); white-space: nowrap; }
  .target-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .tchip {
    font-size: 11.5px; color: var(--muted); background: var(--surface);
    border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px;
    font-variant-numeric: tabular-nums;
  }
  .tchip-strong { color: var(--accent-deep); border-color: var(--accent-soft); background: var(--accent-soft); font-weight: 600; }

  /* ---- day card ---- */
  .day {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
    box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden;
  }
  .day-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
    padding: 13px 15px 10px;
  }
  .day-name { font-family: var(--font-head); font-size: 17px; font-weight: 600; }
  .day-name .full { color: var(--faint); font-weight: 400; font-size: 12.5px; font-family: var(--font-ui); margin-left: 6px; }
  .day-macros { display: flex; gap: 5px; font-variant-numeric: tabular-nums; }
  .m {
    font-size: 11px; padding: 2px 7px; border-radius: 999px; background: var(--line-soft);
    color: var(--muted); white-space: nowrap;
  }
  .m b { font-weight: 600; color: var(--ink); }
  .m.warn { background: var(--warn-soft); color: var(--warn); }
  .m.warn b { color: var(--warn); }
  .m.ok-p { background: var(--accent-soft); color: var(--accent-deep); }
  .m.ok-p b { color: var(--accent-deep); }

  /* ---- meal rows ---- */
  .meal {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 15px; border-top: 1px solid var(--line-soft);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: background .12s ease;
  }
  .meal:hover { background: #fafbf9; }
  .meal:active { background: #f2f4ef; }
  .meal-main { flex: 1; min-width: 0; }
  .slot-label { font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); font-weight: 600; }
  .meal-name { font-family: var(--font-head); font-size: 15px; line-height: 1.25; margin-top: 1px; }
  .meal-note { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .meal-name.takeaway { color: var(--muted); font-style: italic; font-family: var(--font-ui); font-size: 14px; }
  .badge {
    font-size: 12px; font-variant-numeric: tabular-nums; color: var(--accent-deep);
    background: var(--accent-soft); border-radius: 8px; padding: 4px 8px; white-space: nowrap;
    font-weight: 600; text-align: right;
  }
  .badge small { font-weight: 400; color: var(--accent); }
  .swap {
    flex: none; border: 1px solid var(--line); background: var(--surface); color: var(--muted);
    width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center;
    cursor: pointer; transition: all .12s ease; padding: 0;
  }
  .swap:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .swap svg { width: 16px; height: 16px; display: block; }

  /* ---- side / floor strip ---- */
  .strip {
    display: flex; align-items: center; gap: 10px; padding: 10px 15px;
    border-top: 1px solid var(--line-soft); font-size: 12.5px;
  }
  .strip.side { color: var(--muted); background: #fbfcfa; }
  .strip .muted { color: var(--faint); }
  .strip.side .badge { background: var(--line-soft); color: var(--muted); }
  .strip.side .badge small { color: var(--faint); }
  .strip.floor { background: var(--warn-soft); color: var(--warn); }
  .strip .grow { flex: 1; min-width: 0; }
  .strip .grow b { font-weight: 600; }
  .btn-inline {
    flex: none; font-size: 12px; font-weight: 600; border-radius: 8px; padding: 6px 11px;
    border: 1px solid currentColor; background: transparent; color: inherit; cursor: pointer;
  }
  .btn-inline.solid { background: var(--warn); color: #fff; border-color: var(--warn); }
  .link-inline { background: none; border: none; color: var(--muted); font-size: 12px; text-decoration: underline; cursor: pointer; padding: 0; }

  /* ---- toolbar ---- */
  .toolbar { display: flex; gap: 8px; align-items: center; margin: 0 0 14px; }
  .btn-new {
    flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 600; cursor: pointer;
    background: var(--accent); color: #fff; border: none; border-radius: 11px; padding: 11px 14px;
  }
  .btn-new:active { background: var(--accent-deep); }
  .btn-ghost {
    font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted);
    background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 11px 14px;
  }
  .btn-ghost:active { background: var(--paper); }
  .gen-banner {
    background: var(--accent-soft); color: var(--accent-deep); border-radius: 11px;
    padding: 10px 13px; font-size: 12.5px; margin: 0 0 14px; line-height: 1.4;
  }

  /* ---- footer actions ---- */
  .foot { display: flex; justify-content: center; margin-top: 8px; }

  /* ---- sheet / modal ---- */
  .scrim {
    position: fixed; inset: 0; background: rgba(30, 36, 31, .38); z-index: 40;
    opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    background: var(--surface); border-radius: 18px 18px 0 0;
    max-width: 560px; margin: 0 auto; max-height: 88vh; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform .26s cubic-bezier(.32, .72, 0, 1);
    box-shadow: 0 -8px 40px rgba(30, 36, 31, .22);
  }
  .sheet.open { transform: translateY(0); }
  .sheet-grab { width: 38px; height: 4px; border-radius: 2px; background: var(--line); margin: 9px auto 4px; flex: none; }
  .sheet-head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    padding: 6px 18px 12px; border-bottom: 1px solid var(--line-soft); flex: none;
  }
  .sheet-title { font-family: var(--font-head); font-size: 19px; font-weight: 600; line-height: 1.2; }
  .sheet-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .x { flex: none; border: none; background: var(--line-soft); color: var(--ink); width: 30px; height: 30px; border-radius: 999px; font-size: 17px; cursor: pointer; line-height: 1; }
  .sheet-body { padding: 4px 18px calc(26px + env(safe-area-inset-bottom)); overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* recipe detail */
  .macro-strip { display: flex; gap: 8px; margin: 14px 0 6px; }
  .macro-strip .cell {
    flex: 1; text-align: center; background: var(--paper); border: 1px solid var(--line);
    border-radius: 10px; padding: 8px 4px; font-variant-numeric: tabular-nums;
  }
  .macro-strip .cell .v { font-size: 16px; font-weight: 600; }
  .macro-strip .cell .k { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
  .macro-strip .cell.p { background: var(--accent-soft); border-color: var(--accent-soft); }
  .macro-strip .cell.p .v { color: var(--accent-deep); }
  .desc { font-size: 13.5px; color: var(--muted); margin: 12px 0 0; }
  .rsec-h { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin: 20px 0 8px; }
  .rsub { font-family: var(--font-head); font-size: 13.5px; font-weight: 600; margin: 12px 0 4px; }
  .ing, .steps, .notes { margin: 0; padding-left: 18px; }
  .ing li, .notes li { font-size: 13.5px; margin: 4px 0; }
  .steps { padding-left: 20px; }
  .steps li { font-size: 13.5px; margin: 7px 0; padding-left: 3px; }
  .notes li { color: var(--muted); }

  /* swap / side option list */
  .opt {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    padding: 12px 4px; border: none; border-bottom: 1px solid var(--line-soft);
    background: none; cursor: pointer; color: var(--ink); font-family: var(--font-ui);
  }
  .opt:active { background: #f6f8f4; }
  .opt-main { flex: 1; min-width: 0; }
  .opt-name { font-family: var(--font-head); font-size: 14.5px; }
  .opt-macros { font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; margin-top: 2px; }
  .opt-badge { font-size: 12px; font-weight: 600; color: var(--accent-deep); background: var(--accent-soft); border-radius: 8px; padding: 4px 8px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .opt.current { }
  .opt-cur-tag { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
  .sort-note { font-size: 11.5px; color: var(--faint); margin: 2px 0 10px; }

  .empty { text-align: center; padding: 80px 20px; color: var(--muted); font-family: var(--font-head); }

  /* ---- access gate ---- */
  #gate {
    position: fixed; inset: 0; z-index: 100; background: var(--paper);
    display: none; align-items: center; justify-content: center; padding: 24px;
  }
  .gate-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 18px;
    box-shadow: var(--shadow); padding: 26px 22px; width: 100%; max-width: 340px; text-align: center;
  }
  .gate-mark { font-size: 30px; line-height: 1; }
  .gate-card h2 { font-family: var(--font-head); font-weight: 600; font-size: 20px; margin: 12px 0 4px; }
  .gate-card p { font-size: 12.5px; color: var(--muted); margin: 0 0 18px; }
  .gate-card input {
    width: 100%; font-size: 16px; font-family: var(--font-ui); color: var(--ink);
    background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 12px; margin-bottom: 9px; -webkit-appearance: none;
  }
  .gate-card input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  .gate-card button {
    width: 100%; font-size: 14px; font-weight: 600; font-family: var(--font-ui);
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 12px; margin-top: 4px; cursor: pointer;
  }
  .gate-card button:active { background: var(--accent-deep); }
  .gate-err { color: var(--warn); font-size: 12.5px; min-height: 16px; margin-top: 10px; }

  @media (prefers-reduced-motion: reduce) {
    .sheet, .scrim, .meal, .swap { transition: none; }
  }
</style>

<div id="gate">
  <form class="gate-card" id="gate-form">
    <div class="gate-mark">🥗</div>
    <h2>This week's meal plan</h2>
    <p>Enter the shared login to view.</p>
    <input id="gate-user" type="text" autocomplete="username" placeholder="Login" autocapitalize="none" autocorrect="off" spellcheck="false" />
    <input id="gate-pass" type="password" autocomplete="current-password" placeholder="Password" />
    <button type="submit">Open plan</button>
    <div class="gate-err" id="gate-err"></div>
  </form>
</div>

<div id="app" class="wrap"></div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
  <div class="sheet-grab"></div>
  <div class="sheet-head">
    <div>
      <div class="sheet-title" id="sheet-title"></div>
      <div class="sheet-sub" id="sheet-sub"></div>
    </div>
    <button class="x" id="sheet-close" aria-label="Close">&times;</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

erved) bang bang sauce over the tops.","Bake 25–30 min until golden and cooked through.","Serve with rice, cabbage, carrot and cucumber; drizzle the reserved sauce and scatter spring onion."],"notes":["The sauce mayo was swapped for an equal weight of Greek yogurt light (Hacendado). **Greek yogurt can split under high heat — brush the chicken with sauce, but stir the reserved serving sauce in off the heat, and watch the bake.**","Computed total (514 kcal) is lower than the site's 754 kcal because of the mayo→yogurt swap. Sweet chilli sauce (Hacendado) and sriracha are now real, so no `?` placeholders remain.","\"Steamed rice\" assumed as 200g dry basmati (Hacendado) for the batch (~50g/serving). At 514 kcal/serving it is well under the 800 kcal meal-fit ceiling."]},"dinner/ready-meals/beef-casserole":{"id":"dinner/ready-meals/beef-casserole","name":"Beef casserole","meal":"dinner","servings":4,"calories":447,"protein":30.7,"carbs":35.6,"fat":17.1,"isBase":false,"description":"Slow-braised beef chuck with red wine, carrots and baby potatoes. Makes 4 portions. **Scaled from the site's 6 servings to 4** (×0.667 on every quantity). Source: simplehomeedit.com. Macros include the beef stock.","ingredients":["- 533g beef chuck / braising steak, lean, cut into bite-sized pieces","- 1⅓ tsp sea salt flakes","- ⅔ tsp (~1.4g) black pepper, ground","- 1⅓ tbsp (~18.7g) olive oil","- 1⅓ (~147g) brown onion (yellow), finely diced","- ⅔ tbsp (~6g) garlic, raw, roughly chopped","- ⅔ tbsp (~10.7g) tomato paste","- 23g plain (all-purpose) flour","- 167ml (~167g) dry red wine","- 667ml water","- 1⅓ tsp beef stock powder / bouillon (~37 g product for the 667 ml liquid)","- 2–3 sprigs (~2.7g) thyme, fresh (or ⅔ tsp dried)","- ⅔ bay leaf, dried","- ⅔ tsp (~2.8g) sugar","- 2⅔ large (~400g) carrots, peeled and sliced","- 333g baby potatoes (white), halved"],"method":["Season the beef; brown in batches in the hot oil.","Sauté the onion and garlic; add the tomato paste.","Return the beef; stir in the flour, then the red wine.","Add the water, stock, thyme, bay leaf and sugar.","Cover and cook 2 h on low heat.","Add the carrots and potatoes; cook 1 h more."],"notes":["All quantities scaled ×0.667 from the site's 6 servings to land at 4.","Macros include the beef stock powder / bouillon (Knorr-style, ~37 g product for 667 ml prepared). Bay leaf contributes negligibly.","Computed 447 kcal/serving for the stew alone (vs site 459).","Meal-fit: 447 kcal/serving is well under the 700 ceiling, so the recipe is kept.","<\/content>"]},"dinner/ready-meals/beef-rissoles":{"id":"dinner/ready-meals/beef-rissoles","name":"Beef rissoles","meal":"dinner","servings":4,"calories":510,"protein":25.8,"carbs":15.1,"fat":38,"isBase":false,"description":"Pan-fried beef rissoles (4 servings). Serve with mash and steamed greens. Imported from simplehomeedit.com.","ingredients":["- 500 g minced (ground) beef, 85% lean (USDA generic)","- 1 onion (~110 g), grated (Brown onion, USDA generic)","- 1 tsp minced garlic (~3 g) (Garlic, raw, USDA generic)","- 1 egg (~60 g) (XL eggs, Hacendado)","- 60 g panko breadcrumbs (USDA generic)","- 1 tbsp ketchup (~17 g) (Tomato ketchup, USDA generic)","- ½ tsp freshly cracked black pepper (Black pepper, ground, USDA generic)","- 1 tsp sea salt flakes (Salt, USDA generic)","- 3 tbsp olive oil (~42 g), for frying (Olive oil, USDA generic)","- 1 tbsp finely chopped flat-leaf parsley (~4 g) (Parsley, fresh, USDA generic)"],"method":["Combine minced beef, grated onion, minced garlic, egg, panko, ketchup, pepper and salt in a large bowl. Roll into golf-ball portions and flatten with your palm into rissoles.","Heat olive oil in a heavy-based frying pan over medium–low heat. Cook the rissoles 8–10 minutes until browned, turning once. Cook in batches to avoid crowding.","Optional gravy: turn off the heat, drain excess oil, add 2–3 tablespoons water and scrape up the pan drippings.","Drizzle the pan juices over the rissoles and serve with mashed potato, steamed greens and chopped parsley."],"notes":["Mashed potato and steamed greens are unquantified \"to serve\" sides and are not included in the per-serving macros — add them per portion.","Computed 510 kcal/serving (vs the site's 542) — close; the difference is the excluded sides and the leaner beef cut. No pending placeholders remain. Under the 700 kcal/serving meal-fit ceiling."]},"dinner/ready-meals/butterflied-portuguese-chicken":{"id":"dinner/ready-meals/butterflied-portuguese-chicken","name":"Butterflied Portuguese chicken","meal":"dinner","servings":4,"calories":675,"protein":46,"carbs":7,"fat":51,"isBase":false,"description":"Whole butterflied chicken roasted with an oregano-paprika-garlic-lemon marinade. 4 servings (quarter each). Imported from simplehomeedit.com. Serve with oven fries, toum and lemon wedges (sides not counted below).","ingredients":["- 1 whole chicken (~980g edible meat & skin, off a ~1.4kg raw bird), butterflied","- 1 tbsp (~3g) dried oregano","- 1 tbsp (7g) sweet paprika","- 1 tbsp (~13g) brown sugar (or honey)","- 1 tbsp (9g) freshly minced garlic","- 1 tbsp (15g) red wine vinegar","- 2 tsp sea salt flakes","- 2 tbsp (~28g) fresh lemon juice","- 60ml (56g) extra-virgin olive oil"],"method":["Preheat oven to 220°C (425°F) / 200°C fan.","Combine oregano, paprika, brown sugar, garlic, vinegar, salt, lemon juice and olive oil.","Place butterflied chicken skin-side up on a large tray; rub the marinade all over. Marinate 30 min–24 h (or cook immediately).","Add 60ml water to the tray; roast 55–65 minutes until juices run clear, basting halfway.","Rest 10 minutes, then cut into quarters. Serve with fries, toum and lemon wedges."],"notes":["**Macros assume ~980g edible meat & skin** off a ~1.4kg whole bird (~30% bone removed). A larger/skin-on bird pushes this toward the 700 kcal/serving ceiling — it currently sits just under it. If you buy a smaller bird, calories drop accordingly.","This is on the heavy side (over the 650 target, under the 700 ceiling) — the skin and 60ml olive oil drive the fat. Pull the skin to cut ~120 kcal/serving.","Conversions: olive oil 60ml ≈ 56g, lemon juice ~14g/tbsp, paprika 7g/tbsp, brown sugar ~13g/tbsp.","Sides (fries, toum) are not included."]},"dinner/ready-meals/cheats-moussaka":{"id":"dinner/ready-meals/cheats-moussaka","name":"Cheat's moussaka","meal":"dinner","servings":4,"calories":576,"protein":32,"carbs":35,"fat":33,"isBase":false,"description":"Layered potato, spiced beef, eggplant and a baked Greek-yogurt-and-cheese topping. Scaled from the site's 6 servings to 4 (per-serving macros are the same). Imported from simplehomeedit.com.","ingredients":["- 1 small eggplant (~267g), sliced into rounds","- Olive oil spray (~9g olive oil)","- ~400g potatoes (≈ 2.5 medium)","- ⅔ tbsp (~9g) extra-virgin olive oil","- ⅔ onion (~73g), finely diced","- ⅔ tsp (~2g) freshly minced garlic","- 333g minced (ground) beef","- 1⅓ tbsp (~21g) tomato paste","- ~83ml red wine (optional)","- 267g tinned crushed tomatoes","- ⅔ tsp dried oregano","- ⅔ tsp ground cumin","- pinch ground cinnamon","- 333g Greek yogurt (Greek yogurt light, Hacendado)","- ~83g grated cheddar","- 1⅓ eggs (~67g)","- ~17g grated parmesan (Grana Padano)","- sea salt, black pepper"],"method":["Preheat oven to 240°C (475°F) / 220°C fan. Salt the eggplant rounds on a rack 10–30 min, wipe dry, spray with oil and bake 15–20 min until soft, turning halfway.","Microwave or boil the potatoes until tender; cool, peel and slice.","Heat olive oil; cook onion and garlic 2–3 min. Add beef; cook 5–6 min until browned.","Add tomato paste (30 sec), then red wine (1–2 min to reduce), then crushed tomatoes, oregano, cumin, cinnamon, salt and pepper; simmer 10–12 min.","Combine yogurt, cheddar, eggs, salt and pepper. **Stir the topping off the heat — Greek yogurt can split when baked; keep the oven moderate and don't overbake.**","Reduce oven to 220°C (425°F) / 200°C fan. Layer sliced potato, then beef, then eggplant in a dish. Drizzle the yogurt topping over; sprinkle parmesan.","Bake 20–25 min until golden. Serve."],"notes":["Native recipe is 6 servings; quantities here are scaled to 4. Per-serving macros are computed off the full batch ÷ servings, so they're unchanged by the scaling.","Beef substituted for the recipe's \"lamb or beef\" option.","Baked yogurt topping: temper it and avoid a too-hot oven to stop it splitting.","Conversions: eggplant ~400g whole, potatoes ~600g (native), tomato paste ~16g/tbsp, eggs ~50g each."]},"dinner/ready-meals/cheesy-chicken-broccolini-rice":{"id":"dinner/ready-meals/cheesy-chicken-broccolini-rice","name":"Cheesy chicken and broccolini rice","meal":"dinner","servings":4,"calories":581,"protein":39,"carbs":49,"fat":28,"isBase":false,"description":"One-pan creamy chicken-thigh risotto-style rice with broccolini and melted cheddar/parmesan. Scaled from the site's 6 servings to 4 (per-serving macros unchanged). Imported from simplehomeedit.com.","ingredients":["- ⅔ tbsp (~9g) olive oil","- ⅔ onion (~73g), finely diced","- ⅔ tsp (~2g) freshly minced garlic","- 333g boneless, skinless chicken thighs (Hacendado), bite-sized","- ⅓ tsp salt, ⅓ tsp black pepper","- ⅔ tsp sweet paprika","- ⅔ tsp onion powder","- ⅔ tsp dried oregano","- 220g arborio (risotto) rice","- 667ml chicken stock (Knorr)","- ~83ml (~86g) cream (Nata para cocinar, Hacendado) — optional","- ⅔ bunch broccolini (~117g), bite-sized","- 167g grated cheddar","- 33g grated parmesan (Grana Padano)","- ⅔ tbsp chopped parsley, to garnish"],"method":["Heat olive oil in a large pan over medium–high heat. Add onion and garlic; cook 1–2 min until fragrant.","Add chicken, salt and pepper; cook 3–5 min until golden.","Stir in paprika, onion powder and oregano, then the rice, chicken stock and cream. **Stir the cream in gently and keep the simmer gentle — light cream can split if boiled hard.**","Bring to a simmer, cover and cook on low 15 min, stirring halfway.","Scatter broccolini over; stir gently, cover and cook 5 min.","Off the heat, stir through cheddar and parmesan; cover 2 min to melt.","Sprinkle parsley and extra parmesan; serve."],"notes":["Native recipe is 6 servings; quantities scaled to 4. Per-serving macros are batch ÷ servings, unchanged by scaling.","All ingredients are real (chicken stock uses the existing Knorr row) — no pending placeholders. Under the 700 ceiling.","Conversions: oil 14g/tbsp, chicken stock per the Knorr row, cream 83ml ≈ 86g, broccolini ~175g/bunch (native)."]},"dinner/ready-meals/chicken-adobo":{"id":"dinner/ready-meals/chicken-adobo","name":"Chicken adobo","meal":"dinner","servings":4,"calories":585,"protein":44,"carbs":54,"fat":20,"isBase":false,"description":"Filipino-style soy-vinegar braised chicken thighs with sesame-ginger cucumbers and steamed rice. Makes 4.","ingredients":["- 600g boneless, skinless chicken thighs (Hacendado), bite-sized","- 1 tbsp (9g) minced garlic","- 80ml (80g) soy sauce (Kikkoman)","- 80ml (80g) white vinegar (or apple cider vinegar)","- 2 bay leaves (dried)","- 1 tbsp (12g) brown sugar","- ½ tsp black pepper, ground","- 2 tbsp (28g) olive oil (for the chicken)","- 4 cups (~630g) cooked jasmine rice, to serve","**Sesame-ginger cucumbers:**","- 2 Lebanese cucumbers (~340g), thickly sliced","- 2 tbsp (28g) olive oil","- 1 tbsp (14g) sesame oil","- 1 tsp (3g) minced ginger","- ½ tsp sea salt flakes"],"method":["Heat 2 tbsp olive oil in a pan over medium-high. Brown the chicken pieces, 4–5 min.","Add the garlic, soy sauce, vinegar, bay leaves, brown sugar and black pepper. Bring to a simmer, then reduce heat and cook 12–15 min until the chicken is cooked through and the sauce is glossy.","Toss the cucumbers with the olive oil, sesame oil, ginger and salt.","Serve the chicken and sauce over steamed jasmine rice with the cucumbers alongside. Garnish with coriander and sliced chilli if desired."],"notes":["Computed 585 vs site 777 kcal — site assumes more oil/rice; values here are from our per-100g tables.","Rice cup assumed ~158g cooked; adjust if you weigh yours."]},"dinner/ready-meals/chicken-fajita-tray-bake":{"id":"dinner/ready-meals/chicken-fajita-tray-bake","name":"Chicken fajita tray bake","meal":"dinner","servings":4,"calories":631,"protein":39.9,"carbs":66,"fat":23,"isBase":false,"description":"Sheet-pan chicken fajitas with capsicum and red onion, served in warm tortillas. Makes 4.","ingredients":["- 500g boneless, skinless chicken breast (Hacendado), sliced","- 1 red capsicum (~120g), sliced","- 1 yellow capsicum (~120g), sliced","- 2 red onions (~220g), in wedges","- 1 tsp (3g) minced garlic","- 2 tsp sweet paprika","- 1 tsp ground cumin","- 1 tsp dried oregano","- 1 tsp onion powder","- 1½ tsp sea salt flakes","- 2 tbsp (42g) honey (BM)","- 3 tbsp (42g) olive oil","- 12 mini flour tortillas (~360g, Hacendado), warmed","- 125g sour cream (Sour cream)","- Lime wedges","- 1 jalapeño, sliced (optional)","- ¼ bunch coriander, chopped"],"method":["Preheat oven to 220°C. Toss the chicken, capsicums and onion with garlic, spices, salt, honey and olive oil on a tray.","Roast 20–25 min, tossing once, until the chicken is cooked and the edges char.","Serve in warm tortillas with sour cream, lime, jalapeño and coriander."],"notes":["Computed 631 vs site 559 — higher because the full 125g sour cream is now included."]},"dinner/ready-meals/chicken-meatball-parmigiana":{"id":"dinner/ready-meals/chicken-meatball-parmigiana","name":"Chicken meatball parmigiana","meal":"dinner","servings":4,"calories":674,"protein":48,"carbs":47,"fat":34,"isBase":false,"description":"Baked chicken meatballs in tomato sauce, topped with cheddar, mozzarella and crispy panko. Makes 4.","ingredients":["**Meatballs:**","- 500g minced (ground) chicken","- 1 tsp sea salt flakes","- ½ tsp black pepper, ground","- 2 tbsp (~8g) chopped flat-leaf parsley","- 1 tsp (3g) minced garlic","- 60g panko breadcrumbs","- 2 tbsp (30g) whole milk","- 50g grated parmesan (Grana Padano)","- 1 egg (Hacendado XL)","**Sauce:**","- 1 tbsp (14g) olive oil","- 1 onion (~150g), diced","- 1 tbsp (9g) minced garlic","- 3 tbsp (48g) tomato paste","- 1 tbsp (15g) red wine vinegar","- 800g canned diced tomatoes","- 2 tsp (8g) sugar","- 1 tsp sea salt flakes","- ½ tsp black pepper, ground","- 2 tsp dried oregano","**The bake:**","- 60g shredded cheddar","- 150g shredded mozzarella (Hacendado)","- 60g panko breadcrumbs","- Olive oil spray"],"method":["Mix the meatball ingredients and roll into balls. Brown in a pan, then set aside.","For the sauce, soften the onion and garlic in the oil; add tomato paste, vinegar, diced tomatoes, sugar, seasoning and oregano. Simmer 10 min.","Nestle the meatballs into the sauce in a baking dish. Top with cheddar, mozzarella and panko, spray with oil.","Bake at 200°C for 20 min until bubbling and golden. Serve with a green salad."],"notes":["Computed 674 vs site 681 — close; under the 700 ceiling."]},"dinner/ready-meals/chicken-quesadillas":{"id":"dinner/ready-meals/chicken-quesadillas","name":"Chicken quesadillas","meal":"dinner","servings":4,"calories":728,"protein":71,"carbs":41,"fat":31,"isBase":false,"description":"Pan-fried chicken quesadillas with fresh pico de gallo and Greek yogurt. Makes 4 (one folded large tortilla each). Cumin and oregano left out per request.","ingredients":["- 800g chicken thighs, boneless & skinless (Hacendado), finely diced","- 3 tbsp (42g) olive oil (2 tbsp for the marinade, 1 tbsp for the pan)","- 1 tsp sweet paprika","- 1 tsp garlic powder","- 1 tsp onion powder","- 1 tsp sea salt flakes","- ½ tsp black pepper, ground","- 1 red onion (~110g), finely diced","- 1 tsp garlic, minced (~3g)","- 4 large flour tortillas (maxi, Hacendado — 60g each, 240g total)","- 250g mozzarella rallado (Hacendado)","- 120g Greek yogurt light (Hacendado) — 30g/serving, in place of sour cream","**Pico de gallo:**","- ½ small red onion (~35g), finely diced","- ¼ tsp sea salt flakes (plus extra to taste)","- 1 lime (~30g juice), juiced","- 3 ripe roma/plum tomatoes (~185g), seeded and diced"],"method":["**Pico de gallo (make first so the onion can mellow):**","Add the diced ½ red onion to a small bowl with the ¼ tsp salt and half the lime juice; let it sit while you prep everything else — this takes the harsh edge off the raw onion.","Halve the tomatoes lengthways and scoop out the seeds and watery pulp (for a non-soggy result), then dice. Stir into the onion with the remaining lime juice and season to taste.","**Quesadillas:**","**Marinate the chicken.** In a large bowl, toss the diced chicken with 2 tbsp of the olive oil, the paprika, garlic powder, onion powder, salt and pepper. Set aside.","**Cook the onion and garlic.** Heat the remaining 1 tbsp olive oil in a large deep frying pan over medium–high. Add the red onion and garlic; cook, stirring, 1–2 min until just softened.","**Cook the chicken.** Add the chicken; cook, stirring, 6–8 min until golden and cooked through. Set aside on a plate.","**Cook the quesadillas.** In the same pan, lay a tortilla. Sprinkle a generous layer of cheese over one half, top with a quarter of the chicken, then more cheese to help it stick. Fold in half. Reduce heat to medium–low and cook 2–3 min until golden and crispy, then flip carefully. Repeat with the remaining tortillas.","**Rest.** Let the quesadillas rest 1 min, then cut into wedges.","**Serve.** Top with the pico de gallo and a dollop of Greek yogurt (swapped in for sour cream); optional guacamole, coriander and lime on the side."],"notes":["Greek yogurt (30g/serving) replaces sour cream — leaner and higher protein.","Thighs can be swapped for breast or tenders (both already in `ingredients.md`) — just don't overcook them.","Rich meal: ~31g fat / 11g saturated per quesadilla, driven by 250g mozzarella + 3 tbsp oil. To lighten it, drop to 1–2 tbsp oil (each tbsp ≈ −3g fat/serving) or trim the cheese."]},"dinner/ready-meals/chicken-satay-skewers":{"id":"dinner/ready-meals/chicken-satay-skewers","name":"Chicken satay skewers","meal":"dinner","servings":4,"calories":477,"protein":41,"carbs":18,"fat":29,"isBase":false,"description":"Curry-coconut marinated chicken skewers with a no-cook peanut dipping sauce. Makes 4. Serve with steamed rice and salad.","ingredients":["**Skewers:**","- 500g boneless, skinless chicken thighs (Hacendado), bite-sized","- 1 tbsp (6g) mild curry powder","- 60ml (60g) coconut milk","- 1 tsp sea salt flakes","- 1 tsp black pepper, ground","- 2 tbsp (28g) olive oil","**No-cook peanut dipping sauce:**","- 125g smooth peanut butter","- 60ml (~75g) sweet chilli sauce (Hacendado)","- 1 tbsp (16g) tamari","- 2 tbsp (30g) fresh lime juice","- 2 tbsp water","- 1 tbsp (~9g) crushed peanuts","**To serve:** steamed rice, cucumber, red onion, coriander, lime, chilli."],"method":["Marinate the chicken in curry powder, coconut milk, salt, pepper and oil for 15 min, then thread onto soaked skewers.","Grill or pan-cook 12–15 min, turning, until charred and cooked through.","Whisk the sauce ingredients (loosen with extra water as needed).","Serve the skewers with the dipping sauce, crushed peanuts and accompaniments."],"notes":["Computed 477 vs site 514 — close. Rice to serve excluded (no quantity given)."]},"dinner/ready-meals/chicken-thai-basil-stir-fry":{"id":"dinner/ready-meals/chicken-thai-basil-stir-fry","name":"Chicken and Thai basil stir-fry with noodles","meal":"dinner","servings":4,"calories":478,"protein":27,"carbs":53,"fat":18,"isBase":false,"description":"Minced chicken stir-fried with broccolini, Thai basil and rice vermicelli in a tamari-sesame sauce. Makes 4.","ingredients":["**Sauce:**","- 1 tbsp (16g) tamari","- 1 tbsp (16g) soy sauce (Kikkoman, for dark soy)","- 1 tbsp (14g) sesame oil","- 1 tbsp (16g) fish sauce","- 1 tbsp (12g) brown sugar","- 80ml (80g) water","- 2 tbsp (16g) cornflour (Maizena)","- ½ tsp chicken stock powder (Knorr)","**Stir-fry:**","- 200g rice vermicelli noodles","- 1 tbsp (14g) olive oil","- 2 spring onions (~30g), sliced","- 1 tbsp (9g) garlic, grated","- 1 tbsp (9g) ginger, grated","- 500g minced (ground) chicken","- 1 bunch broccolini (~150g), cut into pieces","- 1 handful (~10g) Thai basil leaves","- 1 lime, in wedges"],"method":["Whisk all sauce ingredients in a bowl.","Soak/prepare the rice vermicelli per packet, drain.","Heat olive oil in a wok over high. Stir-fry spring onion, garlic and ginger 30 sec, then add the minced chicken and cook 5–6 min, breaking it up.","Add the broccolini; stir-fry 2 min. Pour in the sauce and cook until thickened.","Toss through the noodles and basil. Serve with lime wedges."],"notes":["Computed 478 vs site 504 — close."]},"dinner/ready-meals/coconut-dal":{"id":"dinner/ready-meals/coconut-dal","name":"Coconut Dal","meal":"dinner","servings":4,"calories":574,"protein":26.4,"carbs":81.3,"fat":21.2,"isBase":false,"description":"Red-lentil dal simmered with coconut milk, tomatoes and Indian spices, finished with spinach. Serves 4.","ingredients":["- 375 g dried red lentils (Red lentils, dried)","- 2 tbsp coconut oil (Coconut oil)","- 1 onion, finely diced (Brown onion (yellow), raw)","- 1 tbsp finely chopped garlic (Garlic, raw)","- 1 tbsp finely chopped ginger (Ginger, raw)","- 1 tsp sweet paprika (Sweet paprika)","- 1 tsp ground turmeric (Turmeric, ground)","- 1 tsp ground cumin (Cumin, ground)","- 1 tsp garam masala (Garam masala)","- 750 ml vegetable stock (Vegetable stock)","- 250 ml coconut milk (Coconut milk, canned)","- 200 g canned diced tomatoes (Crushed tomatoes, canned)","- 1 tsp sea salt flakes (Salt)","- ½ tsp black pepper (Black pepper, ground)","- 1 tbsp sugar (Sugar, white/caster (granulated))","- 100 g baby spinach leaves (Baby spinach)"],"method":["Rinse the lentils.","Sauté onion, garlic and ginger in coconut oil until soft.","Add paprika, turmeric, cumin and garam masala; cook 30 seconds.","Add lentils, stock, coconut milk, tomatoes, salt, pepper and sugar; simmer ~20 minutes until lentils are soft.","Stir in spinach off the heat."],"notes":[ -four-cheese-cauliflower-bake":{"id":"dinner/ready-meals/creamy-four-cheese-cauliflower-bake","name":"Creamy Four-Cheese Cauliflower Bake","meal":"dinner","servings":4,"calories":698,"protein":21.5,"carbs":23.7,"fat":55.2,"isBase":false,"description":"Cauliflower baked in a four-cheese sauce with a thyme-panko crumb. Native yield 6; scaled to serve 4.","ingredients":["- 800 g cauliflower, in florets (Cauliflower, raw)","- 40 ml water","- 30 g panko breadcrumbs, total (Panko breadcrumbs)","- 83 g grated vintage cheddar (Cheddar cheese)","- 73 g grated mozzarella (Mozzarella rallado, Hacendado)","- 33 g grated parmesan (Grana Padano)","- 33 g unsalted butter (Mantequilla light, Hacendado)","- 23 g plain flour (Plain (all-purpose) flour)","- 1⅓ tsp mustard powder (Mustard powder, ground)","- 333 ml full-cream milk (Whole (full-cream) milk)","- 167 g cream cheese (Cream cheese)","- 1 tbsp olive oil (Olive oil)","- Fresh thyme leaves (Thyme, fresh)","- Sea salt and black pepper, to taste (Salt / Black pepper, ground)"],"method":["Microwave cauliflower with water until tender.","Make the cheese sauce: melt butter, whisk in flour and mustard powder, then milk; add cheddar, mozzarella, parmesan and cream cheese until smooth. Season.","Layer cauliflower and sauce in a baking dish with a panko base; top with reserved cheese.","Bake 25–30 minutes at 220°C.","Toast olive-oil thyme panko crumb and scatter over for the last few minutes. Rest 5 minutes."],"notes":["Quantities scaled from the site's 6-serving recipe to 4 servings.","Mozzarella mapped to Mozzarella rallado; vintage cheddar to Cheddar cheese; parmesan to Grana Padano; butter to Mantequilla light.","At 698 kcal/serving this sits just under the 700 kcal ceiling — a rich, fat-heavy dish; pair with a light protein side."]},"dinner/ready-meals/creamy-garlic-chicken":{"id":"dinner/ready-meals/creamy-garlic-chicken","name":"Creamy Garlic Chicken","meal":"dinner","servings":4,"calories":361,"protein":27,"carbs":9,"fat":25,"i d ~40 g each. Computed 635 kcal/serv vs site's 595 — within range."]},"dinner/ready-meals/hoisin-chicken-with-lettuce-cups":{"id":"dinner/ready-meals/hoisin-chicken-with-lettuce-cups","name":"Hoisin Chicken with Lettuce Cups","meal":"dinner","servings":4,"calories":419,"protein":35.7,"carbs":40.6,"fat":13.8,"isBase":false,"description":"Hoisin-glazed chicken thigh with pickled carrot, rice vermicelli and a sesame yogurt dressing, served in cos lettuce cups. Serves 4.","ingredients":["- 500 g boneless, skinless chicken thighs (Chicken thigh, Hacendado)","- 1 tbsp olive oil (common)","- 80 ml hoisin sauce (Hoisin sauce)","- 1 tsp freshly minced garlic (Garlic, raw, common)","- 2 carrots, julienned (Carrot, common)","- 1 tbsp rice wine vinegar (Rice wine vinegar, Otafuku)","- 1 tbsp lime juice (Lime juice, fresh, common)","- ½ tsp sesame oil (common)","- ½ tsp sea salt flakes (common)","- ½ tsp caster sugar (Sugar, common)","- 60 g Greek yogurt light (Hacendado) — was whole-egg mayonnaise","- 1 tsp sesame oil (common)","- ½ tsp rice wine vinegar (Rice wine vinegar, Otafuku)","- 1 baby cos lettuce (Romaine/cos lettuce, common)","- 125 g dried rice vermicelli noodles (Rice vermicelli noodles, common)","- 1 Lebanese cucumber, finely sliced (Cucumber, common)","- 2 tbsp crushed roasted peanuts (~18 g) (Peanuts, roasted, common)","- 1 lime wedge (common)"],"method":["Marinate chicken with olive oil, hoisin and garlic.","Combine julienned carrot with rice wine vinegar, lime juice, sesame oil, salt and sugar; set aside to pickle.","Cook chicken in a large pan 10–12 minutes until caramelised and cooked through; add a splash of water in the final 2 minutes to loosen the glaze. Slice.","Whisk Greek yogurt with sesame oil and rice wine vinegar (this replaces the original mayo dressing).","Cook the vermicelli per packet directions. Layer noodles, pickled carrot, cucumber, chicken, yogurt dressing and peanuts into cos lettuce cups. Squeeze over lime."],"notes":["Mayo → Greek yogurt  6 servings to 4 (per-serving macros are the same).","ingredients":["- 1 kg beef chuck (braising) steak (Beef chuck / braising steak, lean, raw)","- ~1.3 tsp ground cumin (Cumin, ground)","- ~1.3 tsp dried oregano (Oregano, dried)","- ~1.3 tsp sweet paprika (Sweet paprika)","- ~1.3 tsp sea salt flakes (Salt)","- ~⅔ tsp black pepper (Black pepper, ground)","- ~⅔ tsp onion powder (Onion powder)","- ~⅔ tsp garlic powder (Garlic powder)","- ~53 ml olive oil (Olive oil)","- 1 onion, finely diced (Brown onion (yellow), raw)","- 2 garlic cloves, chopped (Garlic, raw)","- ~1.3 tsp tomato paste (Tomato paste, canned)","- ~265 g crushed tomatoes (Crushed tomatoes, canned)","- 330 ml beef stock (Beef stock / bouillon (Knorr-style))","- ⅔ tsp sugar (Sugar, white/caster (granulated))","- ⅔ lime, juiced (Lime juice, fresh)"],"method":["Coat the beef with spices and olive oil.","Brown the beef in batches (3–6 minutes per batch), deglazing as needed.","Cook onion and garlic 2–3 minutes.","Add tomato paste, crushed tomatoes, beef stock, sugar and lime juice.","Simmer covered on lowest heat 2 hours.","Uncover and cook 1+ hour more until the beef shreds easily.","Shred with two forks; thicken the sauce on medium-high 10–15 minutes if desired."],"notes":["Quantities scaled to 4 servings from the site's 6; per-serving macros unchanged.","Serve with rice, salad or wraps to round out carbs."]},"dinner/ready-meals/mussels-with-tomato-and-garlic":{"id":"dinner/ready-meals/mussels-with-tomato-and-garlic","name":"Mussels with Tomato and Garlic","meal":"dinner","servings":4,"calories":681,"protein":40,"carbs":30,"fat":35,"isBase":false,"description":"Mussels in a light garlic-tomato and white-wine sauce. Scaled from the site's 2 servings to 4 (per-serving macros unchanged).","ingredients":["(quantities below for 4 servings — double the site's 2-serving recipe)","- 8 tbsp olive oil, split (Olive oil)","- 8 garlic cloves, finely chopped (Garlic, raw)","- 800 g canned crushed tomatoes (Crushed to ady-meals/slow-cooked-traditional-goulash":{"id":"dinner/ready-meals/slow-cooked-traditional-goulash","name":"Slow-cooked Traditional Goulash","meal":"dinner","servings":4,"calories":406,"protein":32.8,"carbs":16.7,"fat":23.6,"isBase":false,"description":"Slow-cooked Hungarian-style beef goulash. Made with beef chuck (the recipe's beef option, chosen over the pork option). Serve over gnocchi/noodles/mash (not included in macros). Source: simplehomeedit.com. > Computed from the ingredient tables. Within the 700 kcal/serving ceiling.","ingredients":["- 600 g beef chuck/braising steak, cut into bite-sized pieces (Beef chuck / braising steak, lean, raw)","- ½ tsp sea salt flakes (Salt)","- ½ tsp freshly cracked black pepper (Black pepper, ground)","- 2 tbsp (28 g) olive oil (Olive oil)","- 2 large garlic cloves (~6 g), finely chopped (Garlic, raw)","- 2 onions (~260 g), roughly diced (Brown onion)","- 2 small carrots (~120 g), roughly diced (Carrot)","- 2 celery stalks (~80 g), roughly diced (Celery, raw)","- 2 tbsp (~14 g) sweet paprika (Sweet paprika)","- 1 tsp caraway seeds (optional)","- 2 tbsp (~32 g) tomato paste (Tomato paste, canned)","- 1½ tbsp (~12 g) plain flour (Plain (all-purpose) flour)","- 500 ml beef stock (Beef stock / bouillon — Knorr-style)","- 1 tbsp (~14 g) sour cream per serving, to serve (Sour cream)","- Finely chopped flat-leaf parsley, to garnish (Parsley, fresh)"],"method":["Season the beef with salt and pepper. Brown in olive oil in batches; set aside.","Soften the onion, carrot, celery and garlic. Stir in paprika and caraway.","Add tomato paste and flour, cook 1 min, then add beef stock and the beef.","Cover and slow-cook ~3–4 h until the beef is tender.","Serve over gnocchi/noodles/mash with a dollop of sour cream and parsley."],"notes":["Beef chuck used (the recipe's beef option) — pork option not used (pantry rule).","Sour cream included at ~1 tbsp (14 g) per serving.","Serving starch (gnocchi/noodles/mash) not included in macros."]},"dinn eam and jalapeño."],"notes":["Scaled from 6 servings to 4 (×2/3).","Mexican cheese → Mozzarella rallado. Optional chipotle in adobo omitted."]},"dinner/ready-meals/slow-cooker-chicken-satay":{"id":"dinner/ready-meals/slow-cooker-chicken-satay","name":"Slow-cooker Chicken Satay","meal":"dinner","servings":4,"calories":432,"protein":33.4,"carbs":18.2,"fat":26.3,"isBase":false,"description":"Slow-cooked peanut satay chicken thighs with onion, capsicum and green beans. Scaled from the site's 6 servings to 4. Serve over jasmine rice with crushed peanuts (not in macros). Source: simplehomeedit.com. > Computed from the ingredient tables. Optional red curry paste omitted. Within the 700 kcal/serving ceiling.","ingredients":["- 400 g boneless, skinless chicken thighs (Chicken thigh, boneless & skinless (Hacendado))","- ~4.4 g (⅔ tbsp) mild curry powder (Curry powder, mild)","- ~1.4 g (⅔ tsp) sweet paprika (Sweet paprika)","- ⅔ tsp sea salt flakes (Salt)","- ⅓ tsp freshly cracked black pepper (Black pepper, ground)","- 1⅓ tbsp (~18.6 g) olive oil (Olive oil)","- 1⅓ onions (~173 g), quartered (Brown onion)","- 1⅓ red capsicums (~200 g), bite-sized (Red capsicum (bell pepper), raw)","- 120 g green beans, trimmed and halved (Green beans)","- ~6.7 g (⅔ tbsp) minced ginger (Ginger, raw)","- ~6 g (⅔ tbsp) minced garlic (Garlic, raw)","- 83 g natural smooth peanut butter (Peanut butter, smooth)","- 1⅓ tbsp (~20 g) apple cider vinegar (Apple cider vinegar)","- 1⅓ tbsp (~21 g) soy sauce (Soy sauce (Kikkoman))","- ~9 g (⅔ tbsp) brown sugar (Brown sugar)","- 180 ml canned coconut milk (Coconut milk, canned)","**To serve (not in macros):** steamed jasmine rice, crushed peanuts."],"method":["Toss the chicken with curry powder, paprika, salt and pepper.","In the slow cooker, combine ginger, garlic, peanut butter, vinegar, soy sauce, brown sugar and coconut milk.","Add the chicken, onion, capsicum and green beans; stir to coat.","Slow-cook on low ~4–5 h until tender. Serve over jasmine rice meatballs":{"id":"dinner/ready-meals/sticky-bbq-meatballs","name":"Sticky BBQ Meatballs","meal":"dinner","servings":4,"calories":415,"protein":20.1,"carbs":27.4,"fat":24.2,"isBase":false,"description":"Baked beef meatballs in a sticky BBQ glaze. Scaled from the site's 5 servings to 4. Serve over jasmine rice (not in macros). Source: simplehomeedit.com. > Computed from the ingredient tables. Worcestershire sauce dropped (pantry rule). Within the 700 kcal/serving ceiling.","ingredients":["**Meatballs:**","- 400 g minced (ground) beef (Minced (ground) beef, 85% lean / 15% fat, raw)","- 24 g panko breadcrumbs (Panko breadcrumbs)","- ~40 g (0.8 egg) egg (XL eggs (Hacendado))","- ~32 g brown onion, finely grated (Brown onion)","- ~5 g (1.6 tsp) minced garlic (Garlic, raw)","- ~2 g (0.8 tsp) onion powder (Onion powder)","- ~1.8 g (0.8 tsp) sweet paprika (Sweet paprika)","- 0.8 tsp sea salt flakes (Salt)","- ⅓ tsp black pepper (Black pepper, ground)","- ~11 g (0.8 tbsp) olive oil (Olive oil)","**Sticky BBQ glaze:**","- 100 g ketchup (Tomato ketchup)","- 44 g brown sugar (Brown sugar)","- ~17 g (0.8 tbsp) honey (Honey (BM))","- ~26 g (1.6 tbsp) soy sauce (Soy sauce (Kikkoman))","- ~2.4 g (0.8 tsp) minced garlic (Garlic, raw)","- ~5 g (0.8 tsp) sweet paprika (Sweet paprika)","- ~12 g (0.8 tbsp) apple cider vinegar (Apple cider vinegar)","- 50 ml water","**To serve (not in macros):** steamed jasmine rice, sliced spring onions."],"method":["Mix the meatball ingredients and roll into balls. Bake or pan-fry until browned and cooked.","Simmer the glaze ingredients until thickened.","Toss the meatballs in the glaze. Serve over rice with spring onions."],"notes":["Scaled from 5 servings to 4 (×4/5).","Worcestershire sauce dropped (pantry rule).","Protein is ~20 g/serving — pair with a protein-forward side if used on a high-protein day."]},"dinner/ready-meals/sticky-hoisin-beef":{"id":"dinner/ready-meals/sticky-hoisin-beef","name":"Sticky Hoisin Beef","meal":"dinner","servings":4,"ca ir-fry until golden and cooked through.","Add capsicum and onion, stir-fry 2–3 minutes until just tender.","Pour in tamari and sweet chilli sauce, add broccoli, and toss until glossy and coated.","Serve over steamed rice, topped with spring onion."],"notes":["Steamed rice is served alongside but not included in the per-serving totals (quantity not specified by the recipe)."]},"lunch/base/baked-chicken-breast-base":{"id":"lunch/base/baked-chicken-breast-base","name":"Baked chicken breast base (batch)","meal":"lunch","servings":4,"calories":177,"protein":30.6,"carbs":3.5,"fat":5.3,"isBase":true,"description":"Air-fried seasoned chicken breast. Batch of 500g raw → 4 portions (~125g raw / ~95g cooked each). A plain protein base for bowls, salads, wraps or alongside rice/veg.","ingredients":["- 500g chicken breast (Hacendado)","- 1 tbsp (~7g) sweet paprika","- 1 tbsp (~7g) chicken spices / seasoning blend","- 1 tsp sea salt flakes","- 1 tbsp (~6g) black pepper, ground","- 1 tbsp (14g) olive oil"],"method":["Mix the paprika, chicken spices, salt, pepper and olive oil into a paste.","Rub it all over the chicken breasts to coat.","Air fry at 180°C for 20 min, then turn up to 200°C for a further 10 min, until cooked through (74°C internal) and golden.","Rest a few minutes, then slice. Divide into 4 portions."],"notes":["Lean base: ~30g protein and only ~5g fat per portion. Filed under lunch, but it works as a dinner protein too — say the word and I'll move it.","1 tbsp black pepper makes it quite peppery — drop to 1 tsp if you prefer it milder.","Cooked weight is ~95g/portion (breast loses ~25% water); the macros are off the 125g raw, which is what counts for tracking."]},"lunch/ready-meals/bang-bang-chicken-salad":{"id":"lunch/ready-meals/bang-bang-chicken-salad","name":"Bang bang chicken salad","meal":"lunch","servings":4,"calories":544,"protein":46,"carbs":68.9,"fat":10.5,"isBase":false,"description":"Vermicelli noodle salad with pan-cooked shredded chicken, crunchy cabba     const bk = alternatives("breakfast");
    const weekdayBk = bk.filter((r) => !isWeekend(r)).length ? bk.filter((r) => !isWeekend(r)) : bk;
    const weekendBk = bk.filter(isWeekend).length ? bk.filter(isWeekend) : bk;
    const lunches = pickDistinct(alternatives("lunch"), 2);
    const dinners = pickDistinct(alternatives("dinner"), 3);
    const wk = pickDistinct(weekdayBk, Math.min(6, weekdayBk.length));
    const ovr = {};
    const set = (day, meal, id) => { (ovr[day] = ovr[day] || {})[meal] = id; };
    // Breakfasts: Mon–Sat weekday (cycle if fewer than 6 distinct), Sun special.
    ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].forEach((d, i) => set(d, "breakfast", wk[i % wk.length].id));
    set("Sun", "breakfast", weightedPick(weekendBk).id);
    // Lunches: L1 Mon–Thu, L2 Fri–Sun.
    ["Mon", "Tue", "Wed", "Thu"].forEach((d) => set(d, "lunch", lunches[0].id));
    ["Fri", "Sat", "Sun"].forEach((d) => set(d, "lunch", lunches[1].id));
    // Dinners: A Mon+Tue, B Thu+Fri, C Sat+Sun. Wed left as takeaway.
    ["Mon", "Tue"].forEach((d) => set(d, "dinner", dinners[0].id));
    ["Thu", "Fri"].forEach((d) => set(d, "dinner", dinners[1].id));
    ["Sat", "Sun"].forEach((d) => set(d, "dinner", dinners[2].id));
    ovr.__mode = "generated";
    return ovr; // No auto-sides: the main meals must carry the day to 1,600 on their own.
  }
  function scoreWeek(ovr) {
    let score = 0;
    const seen = new Set();
    for (const day of DAYS) {
      if (isTakeawayDay(day, ovr)) continue;
      const t = mainTotals(day, ovr); // main meals only — the floor is on these
      // Reaching the 1,600 main-meal floor is the dominant goal.
      score += t.calories >= DATA.meta.floors.calories ? 20 : -(DATA.meta.floors.calories - t.calories) / 15;
      score += t.protein >= DATA.meta.floors.protein ? 12 : -(DATA.meta.floors.protein - t.protein);
      score -= Math.abs(t.protein - DATA.meta.targets.protein) * 0.12;
      score -= Math.abs(t.calories - DATA.meta.targets.calories) * 0.006;
    }
    // Reward distinct dinners across the week.
    for (const day of DAYS) { const r = resolve(day, "dinner", ovr); if (r.recipe) seen.add(r.recipe.id); }
    score += seen.size * 3;
    return score;
  }
  function generateWeek() {
    let best = null, bestScore = -Infinity;
    for (let i = 0; i < 300; i++) {
      const c = buildCandidate();
      const s = scoreWeek(c);
      if (s > bestScore) { bestScore = s; best = c; }
    }
    return best;
  }

  // ---------- render ----------
  function render() {
    const app = $("#app");
    if (!DATA) { app.innerHTML = '<div class="empty">No plan loaded yet.<br>Run <code>/meal-plan</code> to build this week.</div>'; return; }
    const t = DATA.meta.targets;
    let html = `
      <header class="top">
        <div class="top-inner">
          <div>
            <div class="eyebrow">Protein-first · this week</div>
            <h1 class="title">Your meal plan</h1>
          </div>
          <div class="when">${esc(prettyDate(DATA.meta.generated))}</div>
        </div>
        <div class="target-row">
          <span class="tchip tchip-strong">Target ${t.calories} kcal</span>
          <span class="tchip">${t.protein} g protein</span>
          <span class="tchip">${t.carbs} g carbs</span>
          <span class="tchip">${t.fat} g fat</span>
        </div>
      </header>`;

    // "Reset to plan" only appears once you've actually changed something.
    const gen = overrides.__mode === "generated";
    const dirty = Object.keys(overrides).some((k) => k !== "__mode");
    html += `
      <div class="toolbar">
        <button class="btn-new" id="new-week">🎲 New week</button>
        ${dirty ? `<button class="btn-ghost" id="reset2">Reset to plan</button>` : ""}
      </div>`;
    if (gen)
      html += `<div class="gen-banner">Showing a <b>reshuffled week</b> — a what-if saved on this phone, not your official plan or grocery list. Tap <b>Reset to plan</b> to go back.</div>`;
    else if (dirty)
      html += `<div class="gen-banner">You've swapped some meals. <b>Reset to plan</b> to restore the official week.</div>`;

    for (const d of DATA.plan.days) html += dayCard(d.day);

    app.innerHTML = html;

    const newWeek = $("#new-week");
    if (newWeek) newWeek.addEventListener("click", () => {
      newWeek.textContent = "Shuffling…";
      setTimeout(() => { overrides = generateWeek(); saveOverrides(); render(); try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch (e) {} }, 20);
    });
    const reset2 = $("#reset2");
    if (reset2) reset2.addEventListener("click", () => { overrides = {}; saveOverrides(); render(); });

    app.querySelectorAll("[data-meal]").forEach((el) => {
      el.addEventListener("click", (e) => {
        if (e.target.closest(".swap")) return;
        openRecipe(el.dataset.day, el.dataset.meal);
      });
    });
    app.querySelectorAll(".swap").forEach((el) =>
      el.addEventListener("click", () => openSwap(el.dataset.day, el.dataset.meal))
    );
    app.querySelectorAll("[data-side]").forEach((el) =>
      el.addEventListener("click", () => openSide(el.dataset.side))
    );
    const reset = $("#reset");
    if (reset) reset.addEventListener("click", () => {
      overrides = {}; saveOverrides(); render();
    });
  }

  function macroPills(day) {
    const t = dayTotals(day);       // what she eats (includes any optional side)
    const m = mainTotals(day);      // main meals only — the floor is judged on these
    const tg = DATA.meta.targets, fl = DATA.meta.floors;
    const exempt = isTakeawayDay(day);
    const pClass = m.protein < fl.protein && !exempt ? "warn" : t.protein >= tg.protein ? "ok-p" : "";
    const cClass = m.calories < fl.calories && !exempt ? "warn" : "";
    return `
      <div class="day-macros">
        <span class="m ${cClass}"><b>${Math.round(t.calories)}</b> kcal</span>
        <span class="m ${pClass}"><b>${fmt(t.protein)}</b> P</span>
        <span class="m"><b>${fmt(t.carbs)}</b> C</span>
        <span class="m"><b>${fmt(t.fat)}</b> F</span>
      </div>`;
  }

  function dayCard(day) {
    let rows = "";
    for (const meal of ["breakfast", "lunch", "dinner"]) rows += mealRow(day, meal);

    const takeaway = isTakeawayDay(day);

    // Optional side — a top-up toward the 1,800 target, never needed to clear the floor.
    const side = resolveSide(day);
    let sideRow = "";
    if (side) {
      sideRow = `
        <div class="strip side">
          <div class="grow"><b>Side</b> · ${esc(side.name)} <span class="muted">· optional</span></div>
          <span class="badge">${Math.round(side.calories)}<small> · ${fmt(side.protein)} P</small></span>
          <button class="link-inline" data-side="${day}">change</button>
        </div>`;
    } else if (!takeaway) {
      sideRow = `
        <div class="strip side">
          <div class="grow muted">Optional side — a top-up toward 1,800 kcal</div>
          <button class="link-inline" data-side="${day}">＋ Add</button>
        </div>`;
    }

    // Floor guard — judged on the MAIN meals only (breakfast + lunch + dinner, no side).
    const fl = DATA.meta.floors;
    let floorRow = "";
    if (!takeaway) {
      const m = mainTotals(day);
      const bits = [];
      if (m.calories < fl.calories) bits.push(`${Math.round(m.calories)} kcal (under ${fl.calories})`);
      if (m.protein < fl.protein) bits.push(`${fmt(m.protein)} g protein (under ${fl.protein})`);
      if (bits.length)
        floorRow = `
          <div class="strip floor">
            <div class="grow"><b>Main meals under floor:</b> ${bits.join(" · ")}. Swap a meal for something heartier — a side won't fix this.</div>
          </div>`;
    }

    return `
      <section class="day">
        <div class="day-head">
          <div class="day-name">${day}<span class="full">${DAY_FULL[day]}</span></div>
          ${macroPills(day)}
        </div>
        ${rows}${sideRow}${floorRow}
      </section>`;
  }

  function mealRow(day, meal) {
    const r = resolve(day, meal);
    const swappedTag = overrides.__mode !== "generated" && overrides[day] && overrides[day][meal] ? " · swapped" : "";
    let main, badge;
    if (r.takeaway) {
      main = `<div class="meal-name takeaway">${esc(r.label || "Takeaway / flex")}</div>`;
      badge = "";
    } else if (r.recipe) {
      const note = r.note ? `<div class="meal-note">${esc(r.note)}${swappedTag}</div>` : (swappedTag ? `<div class="meal-note">Your swap</div>` : "");
      main = `<div class="meal-name">${esc(r.recipe.name)}</div>${note}`;
      badge = `<span class="badge">${Math.round(r.recipe.calories)}<small> · ${fmt(r.recipe.protein)} P</small></span>`;
    } else {
      main = `<div class="meal-name takeaway">Recipe unavailable</div>`;
      badge = "";
    }
    return `
      <div class="meal" data-meal="${meal}" data-day="${day}">
        <div class="meal-main">
          <div class="slot-label">${SLOT_LABEL[meal]}</div>
          ${main}
        </div>
        ${badge}
        <button class="swap" data-day="${day}" data-meal="${meal}" aria-label="Swap ${SLOT_LABEL[meal]}" title="Swap this meal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4 3 8l4 4"/><path d="M3 8h13a4 4 0 0 1 0 8h-1"/><path d="m17 20 4-4-4-4"/><path d="M21 16H8"/></svg>
        </button>
      </div>`;
  }

  // ---------- sheets ----------
  let sheetOpen = false;
  function openSheet(title, sub, bodyHtml) {
    $("#sheet-title").textContent = title;
    $("#sheet-sub").textContent = sub || "";
    $("#sheet-sub").style.display = sub ? "block" : "none";
    $("#sheet-body").innerHTML = bodyHtml;
    $("#scrim").classList.add("open");
    $("#sheet").classList.add("open");
    sheetOpen = true;
    return $("#sheet-body");
  }
  function closeSheet() {
    $("#scrim").classList.remove("open");
    $("#sheet").classList.remove("open");
    sheetOpen = false;
  }
  $("#scrim").addEventListener("click", closeSheet);
  $("#sheet-close").addEventListener("click", closeSheet);
  document.addEventListener("keydown", (e) => { if (e.key === "Escape" && sheetOpen) closeSheet(); });

  function renderIngredients(lines) {
    let out = "", inList = false;
    const close = () => { if (inList) { out += "</ul>"; inList = false; } };
    for (const raw of lines) {
      const l = raw.trim();
      let sub = null;
      const h3 = l.match(/^#{3,}\s+(.*)$/);
      if (h3) sub = h3[1];
      else { const b = l.match(/^\*\*(.+?):?\*\*:?$/); if (b) sub = b[1]; }
      if (sub) { close(); out += `<div class="rsub">${inline(sub)}</div>`; continue; }
      if (l.startsWith("- ") || l.startsWith("* ")) {
        if (!inList) { out += '<ul class="ing">'; inList = true; }
        out += `<li>${inline(l.slice(2))}</li>`;
      } else if (l) {
        close(); out += `<p class="desc" style="margin-top:6px">${inline(l)}</p>`;
      }
    }
    close();
    return out || '<p class="desc">No ingredients listed.</p>';
  }

  function openRecipe(day, meal) {
    const r = resolve(day, meal);
    if (r.takeaway || !r.recipe) { openSwap(day, meal); return; }
    const rec = r.recipe;
    const body = `
      ${rec.description ? `<p class="desc">${inline(rec.description)}</p>` : ""}
      <div class="macro-strip">
        <div class="cell"><div class="v">${Math.round(rec.calories)}</div><div class="k">kcal</div></div>
        <div class="cell p"><div class="v">${fmt(rec.protein)}</div><div class="k">Protein</div></div>
        <div class="cell"><div class="v">${fmt(rec.carbs)}</div><div class="k">Carbs</div></div>
        <div class="cell"><div class="v">${fmt(rec.fat)}</div><div class="k">Fat</div></div>
      </div>
      <div class="rsec-h">Ingredients</div>
      ${renderIngredients(rec.ingredients)}
      <div class="rsec-h">Method</div>
      ${rec.method.length ? `<ol class="steps">${rec.method.map((s) => `<li>${inline(s)}</li>`).join("")}</ol>` : '<p class="desc">No method listed.</p>'}
      ${rec.notes.length ? `<div class="rsec-h">Notes</div><ul class="notes">${rec.notes.map((n) => `<li>${inline(n)}</li>`).join("")}</ul>` : ""}
    `;
    openSheet(rec.name, `${SLOT_LABEL[meal]} · ${DAY_FULL[day]}`, body);
  }

  function openSwap(day, meal) {
    const cur = resolve(day, meal);
    const curId = cur.recipe ? cur.recipe.id : null;
    const alts = alternatives(meal);
    let list = "";
    for (const r of alts) {
      const isCur = r.id === curId;
      list += `
        <button class="opt ${isCur ? "current" : ""}" data-pick="${esc(r.id)}">
          <div class="opt-main">
            <div class="opt-name">${esc(r.name)} ${isCur ? '<span class="opt-cur-tag">· on the plan</span>' : ""}</div>
            <div class="opt-macros">${fmt(r.carbs)} g C · ${fmt(r.fat)} g F</div>
          </div>
          <span class="opt-badge">${Math.round(r.calories)} · ${fmt(r.protein)} P</span>
        </button>`;
    }
    const planned = planSlot(day, meal);
    const canRevert = overrides[day] && overrides[day][meal];
    const revert = canRevert && planned && !planned.takeaway
      ? `<button class="opt" data-pick="__revert"><div class="opt-main"><div class="opt-name" style="color:var(--accent-deep)">↺ Back to the planned meal</div></div></button>`
      : "";
    const body = `<div class="sort-note">Alternatives for ${SLOT_LABEL[meal].toLowerCase()}, highest protein first. Your pick is saved on this phone for the week and recomputes the day — it doesn't change your shopping list.</div>${revert}${list}`;
    const el = openSheet(`Swap ${SLOT_LABEL[meal].toLowerCase()}`, DAY_FULL[day], body);
    el.querySelectorAll("[data-pick]").forEach((b) =>
      b.addEventListener("click", () => {
        const id = b.dataset.pick;
        if (id === "__revert") delete ov(day)[meal];
        else ov(day)[meal] = id;
        saveOverrides(); closeSheet(); render();
      })
    );
  }

  function openSide(day) {
    const cur = resolveSide(day);
    let list = "";
    for (const s of DATA.sides) {
      const isCur = cur && cur.name === s.name;
      list += `
        <button class="opt ${isCur ? "current" : ""}" data-side-name="${esc(s.name)}">
          <div class="opt-main">
            <div class="opt-name">${esc(s.name)} ${isCur ? '<span class="opt-cur-tag">· current</span>' : ""}</div>
            <div class="opt-macros">${fmt(s.carbs)} g C · ${fmt(s.fat)} g F</div>
          </div>
          <span class="opt-badge">${Math.round(s.calories)} · ${fmt(s.protein)} P</span>
        </button>`;
    }
    const noneRow = cur ? `<button class="opt" data-side-none="1"><div class="opt-main"><div class="opt-name" style="color:var(--muted)">✕ No side</div></div></button>` : "";
    const body = `<div class="sort-note">A calorie- or protein-dense top-up to clear the day's floor. Saved on this phone for the week.</div>${noneRow}${list}`;
    const el = openSheet("Add a side", DAY_FULL[day], body);
    el.querySelectorAll("[data-side-name]").forEach((b) =>
      b.addEventListener("click", () => {
        const s = DATA.sides.find((x) => x.name === b.dataset.sideName);
        ov(day).side = s; saveOverrides(); closeSheet(); render();
      })
    );
    el.querySelectorAll("[data-side-none]").forEach((b) =>
      b.addEventListener("click", () => {
        ov(day).side = null; saveOverrides(); closeSheet(); render();
      })
    );
  }

  // ---------- misc ----------
  function prettyDate(iso) {
    if (!iso) return "";
    const [y, m, d] = iso.split("-").map(Number);
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    if (!m) return iso;
    return `Week of ${d} ${months[m - 1]} ${y}`;
  }

  // ---------- access gate ----------
  const GATE = DATA && DATA.gate ? DATA.gate : null;
  const GATE_KEY = "mealplan:gate";

  function reveal() {
    const g = document.getElementById("gate");
    if (g) g.style.display = "none";
    render();
  }
  function initGate() {
    const g = document.getElementById("gate");
    if (!GATE || !g) { reveal(); return; }
    let unlocked = false;
    try { unlocked = localStorage.getItem(GATE_KEY) === GATE.hash; } catch (e) {}
    if (unlocked) { reveal(); return; }
    g.style.display = "flex";
    const form = document.getElementById("gate-form");
    const err = document.getElementById("gate-err");
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const u = document.getElementById("gate-user").value.trim().toLowerCase();
      const p = document.getElementById("gate-pass").value;
      if (u === String(GATE.username).toLowerCase() && sha256(p) === GATE.hash) {
        try { localStorage.setItem(GATE_KEY, GATE.hash); } catch (e) {}
        err.textContent = "";
        reveal();
      } else {
        err.textContent = "Wrong login or password. Try again.";
        document.getElementById("gate-pass").value = "";
      }
    });
    document.getElementById("gate-user").focus();
  }

  initGate();
</script>
</body>
</html>
